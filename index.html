<style>
  :root{
    --teal:#1C9DB1;
    --teal-deep:#16808F;
    --ink:#2C2B28;
    --muted:#6F6B64;
    --line:#E7E2D8;
    --sea:#2BA3B4;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
  body{
    margin:0;background:#fff;color:var(--ink);
    font-family:"Inter",system-ui,sans-serif;line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  .serif{font-family:"Fraunces",Georgia,serif}

  /* ---------------- sticky tabs ---------------- */
  .tabs{
    position:sticky;top:0;z-index:60;
    background:rgba(255,255,255,.96);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
    display:flex;justify-content:center;gap:6px;
    padding:9px 10px;
  }
  .tab{
    appearance:none;border:none;background:none;cursor:pointer;
    font-family:"Fraunces",Georgia,serif;font-size:17px;font-weight:500;
    letter-spacing:.01em;color:var(--muted);
    padding:8px 4px;margin:0 12px;border-bottom:2px solid transparent;white-space:nowrap;
    transition:.2s;
  }
  .tab.active{color:var(--teal-deep);border-bottom-color:var(--teal)}

  /* ---------------- view switching ---------------- */
  .view{display:none}
  .view.active{display:block}

  /* ---------------- scene pattern: pinned bg, panels glide over ---------------- */
  .scene{position:relative}
  .scene > .bg{position:sticky;top:0;height:100vh;z-index:0;overflow:hidden}
  .scene > .cap{position:absolute;left:0;right:0;z-index:1}
  .scene > .panel{position:relative;z-index:2;background:#fff;min-height:100vh}

  /* ---------------- hero map ---------------- */
  .hero .bg{background:var(--sea)}
  .hero .heromap{position:absolute;inset:0;z-index:0;background:var(--sea)}
  .hero-tint{
    position:absolute;inset:0;z-index:1;pointer-events:none;
    background:linear-gradient(180deg,rgba(8,34,40,.55) 0%,rgba(8,34,40,.18) 38%,rgba(8,34,40,.5) 100%);
  }
  .hero .heromap .leaflet-control-attribution{font-size:9px;opacity:.8}
  .hero .cap{top:7vh;text-align:center;color:#fff;padding:0 24px}
  .hero .eyebrow{
    font-size:11px;letter-spacing:.34em;text-transform:uppercase;
    font-weight:600;margin-bottom:12px;opacity:.92;
  }
  .hero h1{
    font-family:"Fraunces",serif;font-weight:600;
    font-size:clamp(23px,4.8vw,38px);line-height:1.1;letter-spacing:-.01em;
    margin:0 auto;max-width:12em;text-shadow:0 2px 18px rgba(0,40,46,.4);
  }
  .hero .dates{
    margin-top:13px;font-size:13px;letter-spacing:.04em;font-weight:500;opacity:.95;
  }
  .scrollcue{
    position:absolute;left:50%;bottom:20px;transform:translateX(-50%);
    z-index:2;color:#fff;opacity:.85;font-size:22px;animation:bob 1.8s ease-in-out infinite;
  }
  @keyframes bob{0%,100%{transform:translate(-50%,0)}50%{transform:translate(-50%,7px)}}

  /* ---------------- overview ---------------- */
  .section{max-width:720px;margin:0 auto;padding:64px 24px 26px}
  .section h2{
    font-family:"Fraunces",serif;font-weight:500;
    font-size:clamp(30px,6vw,44px);line-height:1.05;margin:0 0 26px;
    color:var(--ink);
  }
  .section p{font-size:17px;line-height:1.85;color:#54514b;margin:0 0 22px}
  .feature{
    width:100%;aspect-ratio:16/11;object-fit:cover;display:block;
    border-radius:4px;margin:6px 0 8px;background:#dfe9ea;
  }

  /* ---------------- gallery ---------------- */
  .gallery-wrap{position:relative;margin:34px 0 10px}
  .gallery{
    display:flex;overflow-x:auto;scroll-snap-type:x mandatory;
    gap:0;scrollbar-width:none;-webkit-overflow-scrolling:touch;
  }
  .gallery::-webkit-scrollbar{display:none}
  .slide{flex:0 0 100%;scroll-snap-align:center;padding:0;position:relative}
  .slide-cap{
    position:absolute;left:0;right:0;bottom:34px;z-index:3;text-align:center;
    color:#fff;font-family:"Inter",sans-serif;font-size:13px;font-weight:600;
    letter-spacing:.03em;padding:0 18px;text-shadow:0 1px 10px rgba(0,20,24,.75);
  }
  .slide img{
    width:100%;aspect-ratio:4/5;object-fit:cover;
    display:block;background:#dfe9ea;
  }
  .gallery-wrap::after{
    content:"";position:absolute;left:0;right:0;bottom:0;height:96px;z-index:2;
    pointer-events:none;background:linear-gradient(transparent,rgba(8,24,28,.42));
  }
  .dots{
    position:absolute;left:0;right:0;bottom:16px;z-index:3;
    display:flex;justify-content:center;gap:10px;
  }
  .dot{
    width:9px;height:9px;border-radius:50%;border:1.5px solid rgba(255,255,255,.9);
    background:transparent;transition:.2s;cursor:pointer;padding:0;
    box-shadow:0 0 4px rgba(0,0,0,.25);
  }
  .dot.on{background:#fff}

  /* ---------------- real route map ---------------- */
  .routewrap{max-width:720px;margin:6px auto 2px;padding:0 24px}
  .route-label{
    font-size:11px;letter-spacing:.2em;text-transform:uppercase;
    color:var(--muted);font-weight:600;margin:0 0 12px;
  }
  .routemap{height:380px;border-radius:6px;overflow:hidden;border:1px solid var(--line);background:#dfe9ea}
  .routemap .leaflet-control-attribution{font-size:9px}

  /* ---------------- day scene ---------------- */
  .day .bg img{width:100%;height:100%;object-fit:cover;display:block;background:#cfe0e2}
  .day-scrim{
    position:absolute;inset:0;
    background:linear-gradient(180deg,rgba(10,30,34,.20) 0%,rgba(10,30,34,.05) 42%,rgba(10,30,34,.34) 100%);
  }
  .day .cap{
    top:30vh;text-align:center;color:#fff;padding:0 24px;
    text-shadow:0 2px 26px rgba(0,30,36,.5);
  }
  .day .cap .dno{
    font-family:"Fraunces",serif;font-style:italic;font-weight:500;
    font-size:clamp(22px,5vw,30px);margin-bottom:4px;
  }
  .day .cap h3{
    font-family:"Fraunces",serif;font-weight:600;
    font-size:clamp(36px,8vw,62px);line-height:1.02;margin:0;
  }
  .day .cap .ddate{
    font-family:"Fraunces",serif;font-weight:500;
    font-size:clamp(20px,4.4vw,28px);margin-top:8px;
  }

  /* ---------------- day body (white panel content) ---------------- */
  .day-body{max-width:720px;margin:0 auto;padding:46px 24px 40px}
  .callout{
    background:var(--teal);color:#fff;border-radius:3px;
    padding:20px 22px;font-size:16px;line-height:1.6;margin:0 0 30px;
  }
  .callout.alt{background:#2BB0A4}
  .callout .ttl{font-weight:600;text-transform:uppercase;letter-spacing:.04em;font-size:13.5px;margin-bottom:8px;display:block}
  .ev{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--line)}
  .ev:last-child{border-bottom:none}
  .ev .t{font-weight:600;color:var(--teal-deep);min-width:62px;font-variant-numeric:tabular-nums}
  .ev .d{color:#54514b;font-size:16px;line-height:1.55}
  .para{color:#54514b;font-size:16px;line-height:1.7;margin:16px 0}
  .opt-h{font-weight:600;margin:28px 0 10px;color:var(--ink)}
  .opt{list-style:none;padding:0;margin:0}
  .opt li{
    position:relative;padding:7px 0 7px 22px;color:#54514b;font-size:16px;line-height:1.5;
    border-bottom:1px solid #F1ECE3;
  }
  .opt li::before{content:"–";position:absolute;left:0;color:var(--teal);font-weight:600}

  .day-sep{height:0}

  /* ---------------- closing ---------------- */
  .closing{background:#F6F2EA;padding:54px 24px 70px;text-align:center}
  .closing .inner{max-width:620px;margin:0 auto}
  .closing h2{font-family:"Fraunces",serif;font-weight:500;font-size:clamp(26px,5.5vw,38px);margin:0 0 16px}
  .closing p{color:#5a564f;font-size:16px;line-height:1.8;margin:0 0 8px}
  .closing .air{font-size:14px;color:var(--muted);margin-top:18px;line-height:1.7}

  /* ---------------- back to top ---------------- */
  .totop{
    position:fixed;right:16px;bottom:18px;z-index:70;
    width:48px;height:48px;border-radius:50%;border:none;cursor:pointer;
    background:var(--teal);color:#fff;font-size:20px;
    box-shadow:0 8px 22px -8px rgba(0,40,46,.6);
    opacity:0;pointer-events:none;transition:.25s;
  }
  .totop.show{opacity:1;pointer-events:auto}

  @media(min-width:780px){
    .gallery-wrap{max-width:560px;margin-left:auto;margin-right:auto}
    .routemap{height:440px}
  }
</style>
</head>

/* =================================================================
   FRANCE MAP (shared projection)
================================================================= */
const FR=[[51.05,2.55],[50.8,3.0],[50.35,4.15],[49.8,5.45],[49.5,6.35],[49.2,6.9],[48.97,8.22],[47.9,7.55],[47.45,7.0],[46.95,6.45],[46.4,6.1],[45.9,6.95],[45.13,6.6],[44.2,6.9],[43.75,7.5],[43.55,7.0],[43.05,6.6],[43.12,5.9],[43.35,4.85],[43.0,3.1],[42.45,3.05],[42.5,1.9],[42.55,0.7],[42.8,-0.7],[43.4,-1.6],[44.6,-1.25],[45.6,-1.1],[46.15,-1.25],[46.5,-1.8],[47.3,-2.2],[47.8,-4.4],[48.45,-4.8],[48.7,-3.0],[48.9,-1.5],[49.7,-1.6],[49.5,-1.0],[49.7,0.2],[50.95,1.6],[51.05,2.55]];
const LON_MIN=-5.4,LAT_MAX=51.4,LAT_MID=46.6,KX=Math.cos(LAT_MID*Math.PI/180);
const W=360,H=380,PAD=58;
function bnds(){const xs=[],ys=[];for(const[la,lo]of FR){xs.push((lo-LON_MIN)*KX);ys.push(LAT_MAX-la);}return{mx:Math.min(...xs),Mx:Math.max(...xs),my:Math.min(...ys),My:Math.max(...ys)};}
const B=bnds(),SX=B.Mx-B.mx,SY=B.My-B.my,S=Math.min((W-2*PAD)/SX,(H-2*PAD)/SY),OX=(W-SX*S)/2,OY=(H-SY*S)/2;
function pr(la,lo){return[OX+((lo-LON_MIN)*KX-B.mx)*S,OY+((LAT_MAX-la)-B.my)*S];}
function frPath(){return FR.map((p,i)=>{const[x,y]=pr(p[0],p[1]);return(i?"L":"M")+x.toFixed(1)+" "+y.toFixed(1);}).join(" ")+" Z";}

function heroMap(stops){
  const pts=stops.map(s=>pr(s[0],s[1]));
  let line="M"+pts.map(p=>p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" L");
  const ret="M"+pts[pts.length-1][0].toFixed(1)+" "+pts[pts.length-1][1].toFixed(1)+" L"+pts[0][0].toFixed(1)+" "+pts[0][1].toFixed(1);
  let dots="";
  stops.forEach((s,i)=>{
    const[x,y]=pts[i];const lx=x+s[3],ly=y+s[4],anc=s[5];
    dots+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="4.4" fill="#10242b"/>`;
    dots+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="8.5" fill="none" stroke="#10242b" stroke-opacity=".35" stroke-width="1"/>`;
    dots+=`<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" text-anchor="${anc}" font-family="Inter,sans-serif" font-size="8.4" font-weight="600" letter-spacing=".4" fill="#0c2228">${s[2]}</text>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
    <path d="${frPath()}" fill="rgba(255,255,255,.06)" stroke="#E4D6B0" stroke-width="1.4" stroke-linejoin="round"/>
    <path d="${ret}" fill="none" stroke="#0d2127" stroke-width="1.6" stroke-dasharray="1 5" stroke-linecap="round" stroke-opacity=".55"/>
    <path d="${line}" fill="none" stroke="#0d2127" stroke-width="1.8" stroke-dasharray="1.5 5" stroke-linecap="round"/>
    ${dots}
  </svg>`;
}

/* =================================================================
   RENDER
================================================================= */
function ev([t,d]){
  if(t==="—") return `<div class="ev"><span class="t"></span><span class="d">${d}</span></div>`;
  return `<div class="ev"><span class="t">${t}</span><span class="d">${d}</span></div>`;
}
function galleryHTML(gid, items){
  return `
  <div class="gallery-wrap">
    <div class="gallery" data-gallery="${gid}">
      ${items.map(it=>`<div class="slide"><img loading="lazy" alt="${it.cap||''}" src="${img(it.src,1500)}">${it.cap?`<div class="slide-cap">${it.cap}</div>`:''}</div>`).join("")}
    </div>
    <div class="dots" data-dots="${gid}">
      ${items.map((_,i)=>`<button class="dot ${i===0?'on':''}" data-i="${i}" aria-label="Photo ${i+1}"></button>`).join("")}
    </div>
  </div>`;
}
function dayHTML(d,gid){
  return `
  <section class="scene day">
    <div class="bg"><img loading="lazy" alt="${d.title}" src="${img(d.bg,2000)}"><div class="day-scrim"></div></div>
    <div class="cap">
      <div class="dno">${d.dno}</div>
      <h3>${d.title}</h3>
      <div class="ddate">${d.date}</div>
    </div>
    <div class="panel">
      <div class="day-body">
        <div class="callout"><span class="ttl">${d.intro.ttl}</span>${d.intro.txt}</div>
        ${galleryHTML(gid, d.gallery)}
        ${d.sched.map(ev).join("")}
        <div class="opt-h">Options for the day include:</div>
        <ul class="opt">${d.options.map(o=>`<li>${o}</li>`).join("")}</ul>
        <div class="callout ${d.note.cls}"><span class="ttl">${d.note.ttl}</span>${d.note.txt}</div>
      </div>
    </div>
  </section>`;
}
function viewHTML(key){
  const v=DATA[key];
  return `
  <section class="scene hero">
    <div class="bg">
      <div class="heromap" id="heromap-${key}"></div>
      <div class="hero-tint"></div>
      <div class="scrollcue">⌄</div>
    </div>
    <div class="cap">
      <div class="eyebrow">Two Friends · France</div>
      <h1 class="serif">${v.heroTitle}</h1>
      <div class="dates">${v.dates}</div>
    </div>
    <div class="panel">
      <div class="section">
        <h2 class="serif">${v.overviewH}</h2>
        ${v.overview.map(p=>`<p>${p}</p>`).join("")}
      </div>
      <div class="routewrap">
        <div class="route-label">The Route</div>
        <div class="routemap" id="rmap-${key}"></div>
      </div>
      <div style="max-width:720px;margin:0 auto;padding:0 24px">
        <img class="feature" loading="lazy" alt="${v.overviewH}" src="${img(v.feature,1700)}">
      </div>
      ${galleryHTML(key, v.gallery)}
    </div>
  </section>

  ${v.days.map((d,i)=>dayHTML(d, key+"-d"+(i+1))).join("")}

  <div class="closing">
    <div class="inner">
      <h2 class="serif">Same start &amp; finish: Paris CDG</h2>
      <p>Both trips begin and end at Paris Charles de Gaulle — land the morning of 12 August and be back at the airport by the night of 15 August.</p>
      <div class="air">Paris–Charles de Gaulle (IATA: CDG, ICAO: LFPG)</div>
    </div>
  </div>`;
}

/* =================================================================
   INIT
================================================================= */
document.getElementById("view-coast").innerHTML = viewHTML("coast");
document.getElementById("view-alps").innerHTML  = viewHTML("alps");

// hero background maps (real tiles, non-interactive) + route line
const HEROMAPS={};
function initHeroMap(key){
  const v=DATA[key];
  const pts=v.stops.map(s=>[s[0],s[1]]);
  const map=L.map("heromap-"+key,{
    zoomControl:false,attributionControl:true,
    dragging:false,scrollWheelZoom:false,doubleClickZoom:false,
    boxZoom:false,keyboard:false,touchZoom:false,tap:false
  });
  L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png",
    {maxZoom:18,attribution:"&copy; OpenStreetMap, &copy; CARTO"}).addTo(map);
  L.polyline(pts,{color:"#0d3138",weight:2.5,dashArray:"2 7",opacity:.85}).addTo(map);
  v.stops.forEach(s=>{
    L.circleMarker([s[0],s[1]],{radius:5,color:"#0d2127",weight:2,fillColor:"#16808F",fillOpacity:1}).addTo(map);
  });
  const b=L.latLngBounds(pts).pad(0.35);
  map.fitBounds(b);
  HEROMAPS[key]={map,b};
}

// real interactive route maps (Leaflet + OpenStreetMap)
const ROUTEMAPS={};
function initRouteMap(key){
  const v=DATA[key];
  const pts=v.stops.map(s=>[s[0],s[1]]);
  const map=L.map("rmap-"+key,{scrollWheelZoom:false,zoomControl:true});
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
    {maxZoom:18,attribution:"&copy; OpenStreetMap contributors"}).addTo(map);
  L.polyline(pts,{color:"#16808F",weight:3,dashArray:"3 8",opacity:.95}).addTo(map);
  v.stops.forEach(s=>{
    L.circleMarker([s[0],s[1]],{radius:6,color:"#0d2127",weight:2,fillColor:"#16808F",fillOpacity:1})
      .addTo(map).bindTooltip(s[2],{direction:"top",offset:[0,-6]});
  });
  const b=L.latLngBounds(pts).pad(0.25);
  map.fitBounds(b);
  ROUTEMAPS[key]={map,b};
}
if(window.L){ initHeroMap("coast"); initHeroMap("alps"); initRouteMap("coast"); initRouteMap("alps"); }

// graceful image fallback
function attachFallback(scope){
  scope.querySelectorAll("img").forEach(im=>{
    im.addEventListener("error",()=>{ im.style.background="linear-gradient(135deg,#cfe0e2,#a9c9cd)"; im.style.objectFit="cover"; });
  });
}
attachFallback(document);

// galleries
document.querySelectorAll("[data-gallery]").forEach(g=>{
  const key=g.dataset.gallery;
  const dots=document.querySelector(`[data-dots="${key}"]`);
  const dotEls=[...dots.children];
  let raf=null;
  g.addEventListener("scroll",()=>{
    if(raf)return;
    raf=requestAnimationFrame(()=>{
      raf=null;
      const slide=g.querySelector(".slide");
      const w=slide?slide.getBoundingClientRect().width:g.clientWidth;
      const idx=Math.round(g.scrollLeft/w);
      dotEls.forEach((d,i)=>d.classList.toggle("on",i===idx));
    });
  },{passive:true});
  dotEls.forEach(d=>d.addEventListener("click",()=>{
    const slide=g.querySelector(".slide");
    const w=slide?slide.getBoundingClientRect().width:g.clientWidth;
    g.scrollTo({left:w*(+d.dataset.i),behavior:"smooth"});
  }));
});

// tabs
const tabs=document.getElementById("tabs");
tabs.addEventListener("click",e=>{
  const b=e.target.closest(".tab"); if(!b)return;
  const key=b.dataset.view;
  tabs.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t===b));
  document.getElementById("view-coast").classList.toggle("active",key==="coast");
  document.getElementById("view-alps").classList.toggle("active",key==="alps");
  window.scrollTo({top:0,behavior:"auto"});
  [HEROMAPS[key],ROUTEMAPS[key]].forEach(m=>{
    if(m){ setTimeout(()=>{ m.map.invalidateSize(); m.map.fitBounds(m.b); },80); }
  });
});

// back to top
const totop=document.getElementById("totop");
window.addEventListener("scroll",()=>{ totop.classList.toggle("show",window.scrollY>600); },{passive:true});
totop.addEventListener("click",()=>window.scrollTo({top:0,behavior:"smooth"}));
</script>
